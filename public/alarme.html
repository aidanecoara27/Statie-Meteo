<div class="main-content">

<div class="content-padding">

<h1>Alarme sistem</h1>

<div id="alarm-list"></div>

</div>

</div>

<script>


async function loadAlarms(){

    const res = await fetch('/get-alarms');

    const alarms = await res.json();

    const container = document.getElementById('alarm-list');

    container.innerHTML = '';

    alarms.forEach(a => {

        let color = '#3498db';

        if(a.type === 'offline'){
            color = '#e74c3c';
        }

        if(a.type === 'temperature'){
            color = '#f39c12';
        }

        container.innerHTML += `

        <div style="
            background:white;
            padding:20px;
            border-radius:14px;
            margin-bottom:15px;
            border-left:6px solid ${color};
            box-shadow:0 4px 10px rgba(0,0,0,0.05);
        ">

            <h3>${a.message}</h3>

            <p><strong>Valoare:</strong> ${a.value}</p>

            <p><strong>Data:</strong> ${a.created_at}</p>

        </div>
        `;

    });

}

loadAlarms();

setInterval(loadAlarms, 5000);

document.getElementById('toggle-btn').onclick = () => {

    document.getElementById('sidebar')
        .classList.toggle('collapsed');

};

</script>
