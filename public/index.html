<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMeteo - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RECONSTRUCȚIE ASPECT ORIGINAL */
        :root {
            --sidebar-bg: #212529;
            --header-bg: #ffffff;
            --bg-body: #f8f9fa;
            --green-accent: #72b06e;
        }

        body {
            margin: 0;
            display: flex;
            background-color: var(--bg-body);
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Blocăm body-ul ca să nu se miște sidebar-ul */
        }

        /* SIDEBAR ORIGINAL */
        .sidebar {
            width: 70px; /* Varianta restrânsă din poze */
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            flex-shrink: 0;
        }

        .sidebar i {
            font-size: 20px;
            margin-bottom: 30px;
            color: #adb5bd;
            cursor: pointer;
        }

        .sidebar i.active { color: white; }

        /* MAIN CONTENT - REPARAT PENTRU SCROLL */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto; /* DOAR zona asta are scroll */
        }

        .header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
        }

        .container { padding: 20px; }

        /* CARDURILE TALE ORIGINALE */
        .card-meteo {
            background: white;
            border-radius: 4px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            background: var(--green-accent);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .sensor-item {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 5px;
            padding: 10px;
        }

        /* Etichetele colorate din stânga valorii */
        .label-box {
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            margin-right: 15px;
            min-width: 100px;
            text-align: center;
        }

        .valoare { font-size: 18px; font-weight: bold; }

        .bg-red { background: #d9534f; }
        .bg-blue { background: #5bc0de; }
        .bg-brown { background: #8d6e63; }
        .bg-orange { background: #f0ad4e; }

        /* OpenWeather Section */
        .weather-large { padding: 20px; }
        .temp-main { font-size: 48px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fas fa-bars"></i>
        <i class="fas fa-tachometer-alt active"></i>
        <i class="fas fa-chart-line"></i>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 style="margin:0; font-size:18px;">Statie Meteo Licenta</h2>
            <button style="background:#6f42c1; color:white; border:none; padding:8px 15px; border-radius:4px;">
                <i class="fas fa-chart-line"></i> Citiri senzori
            </button>
        </div>

        <div class="container">
            <div class="card-meteo">
                <div class="card-header">Ultima citire: Statie Meteo - Licenta</div>
                <div style="padding:10px 20px; color:#666; font-size:13px; border-bottom:1px solid #eee;">
                    Data si ora: 4/16/2026, 7:44:27 PM
                </div>
                <div class="sensor-grid">
                    <div class="sensor-item">
                        <div class="label-box bg-red">Temperatură Aer</div>
                        <div class="valoare">22.62 °C</div>
                    </div>
                    <div class="sensor-item">
                        <div class="label-box bg-blue">Umiditate</div>
                        <div class="valoare">-- %</div>
                    </div>
                    <div class="sensor-item">
                        <div class="label-box bg-orange">Presiune Atmosferică</div>
                        <div class="valoare">1007.73 hPa</div>
                    </div>
                    <div class="sensor-item">
                        <div class="label-box bg-brown">Umiditate Sol</div>
                        <div class="valoare">4 %</div>
                    </div>
                </div>
            </div>

            <div class="card-meteo">
                <div class="card-header">
                    <i class="fas fa-bolt"></i> Meteo OpenWeatherMap
                </div>
                <div class="weather-large">
                    <h3 style="margin:0;">București</h3>
                    <p style="color:var(--green-accent); font-weight:bold; text-transform:uppercase;">Cer Senin</p>
                    <div style="display:flex; align-items:center;">
                        <span class="temp-main">18°C</span>
                        <i class="fas fa-sun" style="font-size:40px; color:#f1c40f; margin-left:20px;"></i>
                    </div>
                    <p>Presiune: <b>1018 mb</b></p>
                    <p>Vânt: <b>3.6 km/h</b></p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
