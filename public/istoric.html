<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - SmartMeteo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 240px; --primary-green: #72b06e; }
 /* Modifică asta în secțiunea <style> din istoric.html */
body { 
    /* Aceasta este stiva de fonturi standard pentru un aspect profesional, sans-serif */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    
    /* Ne asigurăm că restul proprietăților rămân la fel */
    margin: 0; 
    display: flex; 
    background-color: #f4f7f6; 
    height: 100vh; 
    overflow: hidden; 
}

        /* SIDEBAR (Actualizat cu tranziții) */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: #212529; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: width 0.3s ease; /* Animație pentru închidere/deschidere */
            overflow: hidden;
        }
        
        /* Starea COLLAPSED (când e strâns) */
        .sidebar.collapsed { width: 70px; }
        .sidebar.collapsed .sidebar-header span, 
        .sidebar.collapsed .sidebar-menu span { display: none; }
        .sidebar.collapsed .sidebar-menu li { justify-content: center; padding: 15px 0; }
        .sidebar.collapsed .sidebar-menu i { margin: 0; font-size: 20px; }

        /* Ajustări pentru Sidebar ca în Dashboard */
        .sidebar-header {
            padding: 25px 20px; /* Padding generos pentru un aspect aerat */
            font-size: 22px;
            font-weight: bold;
            color: white; /* Alb pur pentru titlu */
        }

        .sidebar-menu a {
            color: #adb5bd; /* Gri-ul deschis din poza Dashboard */
            font-size: 15px; /* Dimensiune text meniu */
            font-weight: normal; /* Nu 'bold' pentru elementele secundare */
        }

        /* Efectul de activ/hover */
        .sidebar-menu li:hover a, 
        .sidebar-menu li.active a {
            color: white;
            /* Opțional: o culoare de fundal discretă */
            background-color: rgba(255, 255, 255, 0.05); 
        }
        /* MAIN CONTENT */
        .main-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; transition: margin-left 0.3s ease; }
        .top-header { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #dee2e6; }
        .top-header h2 { font-size: 16px; color: #555; margin: 0; }

        .content-padding { padding: 20px; }
        .status-bar { background-color: var(--primary-green); color: white; padding: 12px 20px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; }

        /* FILTRE & TOGGLES */
        .filter-box { background: white; padding: 20px; border-radius: 4px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .filter-row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }

        .sensor-toggles { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; }
        .toggle-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; cursor: pointer; border: none; }
        .off { opacity: 0.3; filter: grayscale(1); }

        /* CULORI BUTOANE */
        .bg-red { background: #d9534f; }
        .bg-blue { background: #5bc0de; }
        .bg-orange { background: #f0ad4e; }
        .bg-green { background: #5cb85c; }
        .bg-brown { background: #8d6e63; }

        /* GRAFICE */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-card { background: white; padding: 15px; border-radius: 4px; border: 1px solid #dee2e6; }
        .full-width { grid-column: span 2; }
        .hidden { display: none; }
        
        #toggle-btn { cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>SmartMeteo</span>
            <i class="fas fa-bars" id="toggle-btn" style="font-size: 18px;"></i>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li class="active"><i class="fas fa-chart-line"></i> <span>Istoric</span></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h2>Statie Meteo Licenta</h2>
            <div>
                <button style="background:#6f42c1; color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer;" onclick="location.href='index.html'">Dashboard</button>
            </div>
        </div>

        <div class="content-padding">
            <div class="status-bar">Evoluție Parametri: Statie Meteo - Licenta</div>

            <div class="filter-box">
                <div class="filter-row">
                    <div class="filter-group"><label>De la</label><input type="date" id="date-from"></div>
                    <div class="filter-group"><label>Pana la</label><input type="date" id="date-to"></div>
                    <div class="filter-group">
                        <label>Grupare</label>
                        <select id="grup"><option>Ora</option><option>Zi</option></select>
                    </div>
                    <button style="background:#5bc0de; color:white; border:none; padding:7px 15px; border-radius:4px;" onclick="loadData()">Incarca date</button>
                </div>

                <div class="sensor-toggles">
                    <label class="toggle-btn bg-red"><input type="checkbox" checked onchange="toggle(this, 'temp')"> Temperatura Aer</label>
                    <label class="toggle-btn bg-blue"><input type="checkbox" checked onchange="toggle(this, 'hum')"> Umiditate Relativă</label>
                    <label class="toggle-btn bg-orange"><input type="checkbox" checked onchange="toggle(this, 'pres')"> Presiune Atmosferică</label>
                    <label class="toggle-btn bg-green"><input type="checkbox" checked onchange="toggle(this, 'lux')"> Intensitate Luminoasă</label>
                    <label class="toggle-btn bg-brown"><input type="checkbox" checked onchange="toggle(this, 'soil')"> Umiditate Sol</label>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card full-width" id="box-temp"><canvas id="chart-temp"></canvas></div>
                <div class="chart-card" id="box-hum"><canvas id="chart-hum"></canvas></div>
                <div class="chart-card" id="box-pres"><canvas id="chart-pres"></canvas></div>
                <div class="chart-card" id="box-lux"><canvas id="chart-lux"></canvas></div>
                <div class="chart-card" id="box-soil"><canvas id="chart-soil"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA SIDEBAR (Hamburger Menu) ---
        const btn = document.getElementById('toggle-btn');
        const side = document.getElementById('sidebar');

        if (btn && side) {
            btn.onclick = () => {
                side.classList.toggle('collapsed');
                console.log("Sidebar toggled");
            };
        }

        // --- LOGICA GRAFICE ---
        let charts = {};
        function toggle(cb, id) {
            document.getElementById('box-'+id).classList.toggle('hidden', !cb.checked);
            cb.parentElement.classList.toggle('off', !cb.checked);
        }

        async function loadData() {
            try {
                const res = await fetch('/get-history');
                const data = await res.json();
                const labels = data.map(d => d.ora);

                const make = (id, label, color, key) => {
                    const ctx = document.getElementById(id);
                    if(!ctx) return;
                    if(charts[id]) charts[id].destroy();
                    charts[id] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{ label: label, data: data.map(d => d[key]), borderColor: color, tension: 0.3, fill: false }]
                        },
                        options: { responsive: true, plugins: { legend: { position: 'top' } } }
                    });
                };

                make('chart-temp', 'Temperatura (°C)', '#d9534f', 'temperature');
                make('chart-hum', 'Umiditate (%)', '#5bc0de', 'humidity');
                make('chart-pres', 'Presiune (hPa)', '#f0ad4e', 'pressure');
                make('chart-lux', 'Lumina (lx)', '#5cb85c', 'lux');
                make('chart-soil', 'Sol (%)', '#8d6e63', 'soil_moisture');
            } catch (e) {
                console.error("Eroare la încărcarea datelor:", e);
            }
        }

        document.getElementById('date-from').valueAsDate = new Date();
        document.getElementById('date-to').valueAsDate = new Date();
        loadData();
    </script>
</body>
</html>
