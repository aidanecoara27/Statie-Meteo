<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - SmartMeteo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
            --sidebar-bg: #212529;
            --dashboard-green: #72b06e;
            --bg-light: #f4f7f6;
            --border-color: #dee2e6;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            display: flex; 
            background-color: var(--bg-light); 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--sidebar-bg); 
            color: white; 
            height: 100vh;
            flex-shrink: 0; 
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar.active { left: 0 !important; }

        .sidebar-header { 
            padding: 20px; 
            font-size: 20px; 
            font-weight: bold; 
            border-bottom: 1px solid #3d4145; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu a { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: #adb5bd; 
            text-decoration: none; 
            white-space: nowrap;
        }
        .sidebar-menu li.active { border-left: 4px solid var(--dashboard-green); background: rgba(255,255,255,0.05); }
        .sidebar-menu li.active a { color: white; }
        .sidebar-menu i { min-width: 30px; font-size: 18px; }

        /* MAIN CONTENT */
        .main-content { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow-y: auto; 
            min-width: 0; 
        }

        .top-nav { 
            background: white; 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--border-color); 
        }

        .content-padding { padding: 20px; }

        /* FILTRE */
        .filters-container { 
            background: white; 
            padding: 20px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 20px;
        }

        .filter-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        
        .btn-blue {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-blue.active { background: #2c3e50; }
        .btn-blue:hover { opacity: 0.8; }

        /* GRID GRAFICE */
        .charts-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }

        .chart-card { 
            background: white; 
            padding: 15px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color); 
            height: 380px; 
            display: flex;
            flex-direction: column;
        }
        
        .chart-title { font-size: 13px; font-weight: bold; color: #888; margin-bottom: 10px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -240px; }
            .charts-grid { grid-template-columns: 1fr; }
            .filter-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>SmartMeteo</span> 
            <i class="fas fa-bars" id="toggle-sidebar" style="cursor:pointer;"></i>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="istoric.html"><i class="fas fa-chart-line"></i> <span>Istoric</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <i class="fas fa-bars" id="mobile-menu-btn" style="display:none; cursor:pointer;"></i>
            <strong>Istoric Citiri Senzori</strong>
        </div>

        <div class="content-padding">
            <div class="filters-container">
                <div class="filter-row">
                    <div style="flex:1; min-width:150px;">
                        <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">De la</label>
                        <input type="date" id="date-from" style="width:100%; padding:8px; border:1px solid #ddd;">
                    </div>
                    <div style="flex:1; min-width:150px;">
                        <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">Pana la</label>
                        <input type="date" id="date-to" style="width:100%; padding:8px; border:1px solid #ddd;">
                    </div>
                    
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-blue active" onclick="filterCharts('all', this)">Toate</button>
                        <button class="btn-blue" onclick="filterCharts('temp', this)">Temp</button>
                        <button class="btn-blue" onclick="filterCharts('hum', this)">Umid</button>
                    </div>

                    <button class="btn-blue" style="margin-left:auto; background: #27ae60;">Actualizează</button>
                </div>
            </div>

            <div class="charts-grid" id="charts-container">
                <div class="chart-card" data-type="temp"><div class="chart-title">Temperatura</div><canvas id="chart-temp"></canvas></div>
                <div class="chart-card" data-type="hum"><div class="chart-title">Umiditate Aer</div><canvas id="chart-hum"></canvas></div>
                <div class="chart-card" data-type="pres"><div class="chart-title">Presiune</div><canvas id="chart-pres"></canvas></div>
                <div class="chart-card" data-type="lux"><div class="chart-title">Luminozitate</div><canvas id="chart-lux"></canvas></div>
                <div class="chart-card" data-type="soil"><div class="chart-title">Umiditate Sol</div><canvas id="chart-soil"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // SIDEBAR TOGGLE
        document.getElementById('toggle-sidebar').onclick = function() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        };

        // FILTRARE GRAFICE (Logica butonelor Temp/Umid/Toate)
        function filterCharts(type, btn) {
            const cards = document.querySelectorAll('.chart-card');
            cards.forEach(card => {
                if (type === 'all') {
                    card.style.display = 'flex';
                } else {
                    card.style.display = card.getAttribute('data-type') === type ? 'flex' : 'none';
                }
            });
            document.querySelectorAll('.btn-blue').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // INITIALIZARE GRAFICE
        function createChart(canvasId, label, color) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['10:00', '11:00', '12:00', '13:00', '14:00', '15:00'],
                    datasets: [{
                        label: label,
                        data: [0, 0, 0, 0, 0, 0],
                        borderColor: color,
                        backgroundColor: color + '22',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        const charts = {
            temp: createChart('chart-temp', 'Temp (°C)', '#e74c3c'),
            hum:  createChart('chart-hum', 'Umiditate (%)', '#3498db'),
            pres: createChart('chart-pres', 'Presiune (hPa)', '#f39c12'),
            lux:  createChart('chart-lux', 'Lumină (lx)', '#2ecc71'),
            soil: createChart('chart-soil', 'Sol (%)', '#8e44ad')
        };

        // FETCH DATE
        async function updateCharts() {
            try {
                // Aici faci fetch la API-ul tău real
                // Exemplu date dummy pentru test:
                charts.temp.data.datasets[0].data = [22, 23, 22, 24, 25, 24];
                charts.soil.data.datasets[0].data = [40, 42, 39, 38, 41, 40];
                Object.values(charts).forEach(c => c.update());
            } catch (e) { console.error(e); }
        }

        updateCharts();
    </script>
</body>
</html>
