<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - SmartMeteo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
            --sidebar-bg: #212529;
            --dashboard-green: #72b06e;
            --bg-light: #f4f7f6;
            --border-color: #dee2e6;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            display: flex; 
            background-color: var(--bg-light); 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--sidebar-bg); 
            color: white; 
            height: 100vh;
            flex-shrink: 0; 
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header { 
            padding: 20px; 
            font-size: 20px; 
            font-weight: bold; 
            border-bottom: 1px solid #3d4145; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .sidebar-menu a { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: #adb5bd; 
            text-decoration: none; 
            white-space: nowrap;
        }

        .sidebar-menu li.active { border-left: 4px solid var(--dashboard-green); background: rgba(255,255,255,0.05); }
        .sidebar-menu li.active a { color: white; }
        .sidebar-menu i { min-width: 30px; font-size: 18px; }
        .sidebar.collapsed span { display: none; }

        /* MAIN CONTENT - REPARAT */
        .main-content { 
            flex: 1; /* Ocupă tot spațiul rămas la dreapta sidebar-ului */
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            min-width: 0; /* Important pentru flexbox */
        }

        .top-nav { 
            background: white; 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 14px; 
            color: #666;
        }

        .content-padding { padding: 20px; width: 100%; }

        /* FILTRE */
        .filters-container { 
            background: white; 
            padding: 20px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 20px;
        }

        .filter-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        
        /* SELECTORI SIMBOLURI - ORIZONTAL */
        .sensor-selector-container { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 20px;
        }

        .sensor-icons { display: flex; gap: 8px; }
        
        .s-box { 
            width: 32px; height: 32px; border-radius: 4px; border: none; 
            color: white; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; transition: 0.2s; font-size: 14px;
        }

        .s-box.off { opacity: 0.2; filter: grayscale(1); }
        .c-temp { background: #e74c3c; } .c-hum { background: #3498db; }
        .c-pres { background: #f39c12; } .c-lux { background: #2ecc71; }
        .c-soil { background: #795548; }

        /* GRID GRAFICE - REPARAT */
        .charts-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Forțează 2 coloane egale */
            gap: 20px; 
            width: 100%;
        }

        .chart-card { 
            background: white; 
            padding: 15px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color); 
            height: 400px; 
            display: flex;
            flex-direction: column;
        }
        
        .chart-card.hidden { display: none; }
        .chart-title { font-size: 13px; font-weight: bold; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        canvas { flex: 1; width: 100% !important; height: 100% !important; }

        @media (max-width: 1000px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>SmartMeteo</span> 
            <i class="fas fa-bars" id="toggle-sidebar" style="cursor:pointer;"></i>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="istoric.html"><i class="fas fa-chart-line"></i> <span>Istoric</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <i class="fas fa-home"></i> > Statie Licenta > <b>Istoric Citiri</b>
        </div>

        <div class="content-padding">
            <div class="filters-container">
                <div class="filter-row">
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:12px; font-weight:bold;">De la</label>
                        <input type="date" id="date-from" style="padding:8px; border:1px solid #ddd; border-radius:4px;">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:12px; font-weight:bold;">Pana la</label>
                        <input type="date" id="date-to" style="padding:8px; border:1px solid #ddd; border-radius:4px;">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label style="font-size:12px; font-weight:bold;">Grupare</label>
                        <select id="group-by" style="padding:8px; border:1px solid #ddd; border-radius:4px;">
                            <option>Ora</option>
                            <option>Zi</option>
                        </select>
                    </div>
                    <button onclick="loadData()" style="background:#3498db; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; font-weight:bold; margin-left:auto;">
                        <i class="fas fa-sync"></i> Actualizeaza Date
                    </button>
                </div>
            </div>

            <div class="sensor-selector-container">
                <span style="font-size: 11px; font-weight: bold; color: #999;">FILTREAZA GRAFICE:</span>
                <div class="sensor-icons">
                    <button class="s-box c-temp" onclick="toggleChart('box-temp', this)"><i class="fas fa-thermometer-half"></i></button>
                    <button class="s-box c-hum" onclick="toggleChart('box-hum', this)"><i class="fas fa-tint"></i></button>
                    <button class="s-box c-pres" onclick="toggleChart('box-pres', this)"><i class="fas fa-compress-arrows-alt"></i></button>
                    <button class="s-box c-lux" onclick="toggleChart('box-lux', this)"><i class="fas fa-sun"></i></button>
                    <button class="s-box c-soil" onclick="toggleChart('box-soil', this)"><i class="fas fa-seedling"></i></button>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card" id="box-temp"><div class="chart-title">Temperatura Aer (°C)</div><canvas id="chart-temp"></canvas></div>
                <div class="chart-card" id="box-hum"><div class="chart-title">Umiditate Relativa (%)</div><canvas id="chart-hum"></canvas></div>
                <div class="chart-card" id="box-pres"><div class="chart-title">Presiune Atmosferica (hPa)</div><canvas id="chart-pres"></canvas></div>
                <div class="chart-card" id="box-lux"><div class="chart-title">Intensitate Luminoasa (lx)</div><canvas id="chart-lux"></canvas></div>
                <div class="chart-card" id="box-soil"><div class="chart-title">Umiditate Sol (%)</div><canvas id="chart-soil"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Sidebar
        document.getElementById('toggle-sidebar').onclick = function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            // Redimensionare grafice după tranzitie
            setTimeout(() => { Object.values(charts).forEach(c => c.resize()); }, 350);
        };

        // Toggle Grafice
        function toggleChart(boxId, btn) {
            const box = document.getElementById(boxId);
            box.classList.toggle('hidden');
            btn.classList.toggle('off');
        }

        let charts = {};
        async function loadData() {
            try {
                const res = await fetch('/get-history');
                const data = await res.json();
                
                const labels = data.map(d => {
                    const dt = new Date(d.data_ora);
                    return dt.getHours().toString().padStart(2,'0') + ":" + dt.getMinutes().toString().padStart(2,'0');
                });

                const render = (id, label, color, key) => {
                    const ctx = document.getElementById(id).getContext('2d');
                    if(charts[id]) charts[id].destroy();
                    charts[id] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: label,
                                data: data.map(d => d[key]),
                                borderColor: color,
                                backgroundColor: color + '22',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: false, grid: { color: '#f0f0f0' } },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                };

                render('chart-temp', 'Temp', '#e74c3c', 'temperature');
                render('chart-hum', 'Umiditate', '#3498db', 'humidity');
                render('chart-pres', 'Presiune', '#f39c12', 'pressure');
                render('chart-lux', 'Luminozitate', '#2ecc71', 'lux');
                render('chart-soil', 'Umiditate Sol', '#795548', 'soil_moisture');

            } catch (err) { console.error("Eroare incarcare date:", err); }
        }

        window.onload = () => {
            document.getElementById('date-from').valueAsDate = new Date();
            document.getElementById('date-to').valueAsDate = new Date();
            loadData();
        };
    </script>
</body>
</html>
