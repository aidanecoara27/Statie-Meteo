<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - SmartMeteo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
            --sidebar-bg: #212529;
            --dashboard-green: #72b06e;
            --bg-light: #f4f7f6;
            --border-color: #dee2e6;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            display: flex; 
            background-color: var(--bg-light); 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--sidebar-bg); 
            color: white; 
            height: 100vh;
            flex-shrink: 0; 
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header { 
            padding: 20px; 
            font-size: 20px; 
            font-weight: bold; 
            border-bottom: 1px solid #3d4145; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu a { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: #adb5bd; 
            text-decoration: none; 
            white-space: nowrap;
        }

        .sidebar-menu li.active { border-left: 4px solid var(--dashboard-green); background: rgba(255,255,255,0.05); }
        .sidebar-menu li.active a { color: white; }
        .sidebar-menu i { min-width: 30px; font-size: 18px; }

        /* MAIN CONTENT */
        .main-content { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow-y: auto; 
            min-width: 0; 
        }

        .top-nav { 
            background: white; 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 14px; 
            color: #666;
        }

        .content-padding { padding: 20px; }

        /* FILTRE */
        .filters-container { 
            background: white; 
            padding: 20px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color); 
            margin-bottom: 20px;
        }

        .filter-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        
        .btn-blue {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* GRID GRAFICE */
        .charts-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2 coloane pe Laptop */
            gap: 20px; 
        }

        .chart-card { 
            background: white; 
            padding: 15px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color); 
            height: 350px; 
            display: flex;
            flex-direction: column;
        }
        
        .chart-title { font-size: 13px; font-weight: bold; color: #888; margin-bottom: 10px; text-transform: uppercase; }

        /* RESPONSIVE DESIGN (PENTRU TELEFON) */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -240px; /* Ascunde sidebar-ul pe mobil */
            }
            .sidebar.active {
                left: 0; /* Îl arată când e activat */
            }
            .charts-grid { 
                grid-template-columns: 1fr; /* 1 singură coloană pe mobil */
            }
            .filter-row {
                flex-direction: column; /* Filtrele se pun unul sub altul */
                align-items: stretch;
            }
            .filter-row button {
                margin-left: 0 !important;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>SmartMeteo</span> 
            <i class="fas fa-bars" id="toggle-sidebar" style="cursor:pointer;"></i>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="istoric.html"><i class="fas fa-chart-line"></i> <span>Istoric</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <i class="fas fa-bars" id="mobile-menu-btn" style="display:none; cursor:pointer; margin-right:10px;"></i>
            <i class="fas fa-home"></i> > Statie Licenta > <b>Istoric Citiri</b>
        </div>

        <div class="content-padding">
            <div class="filters-container">
                <div class="filter-row">
                    <div style="flex:1; min-width:150px;">
                        <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">De la</label>
                        <input type="date" id="date-from" style="width:100%; padding:8px; border:1px solid #ddd;">
                    </div>
                    <div style="flex:1; min-width:150px;">
                        <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">Pana la</label>
                        <input type="date" id="date-to" style="width:100%; padding:8px; border:1px solid #ddd;">
                    </div>
                    <button class="btn-blue" style="margin-left:auto;">Actualizeaza</button>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card"><div class="chart-title">Temperatura</div><canvas id="chart-temp"></canvas></div>
                <div class="chart-card"><div class="chart-title">Umiditate</div><canvas id="chart-hum"></canvas></div>
                <div class="chart-card"><div class="chart-title">Presiune</div><canvas id="chart-pres"></canvas></div>
                <div class="chart-card"><div class="chart-title">Luminozitate</div><canvas id="chart-lux"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // Logica de toggle care știe dacă ești pe mobil sau laptop
        document.getElementById('toggle-sidebar').onclick = function() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        };

        // Opțional: Închide sidebar-ul pe mobil când dai click în afara lui sau pe un link
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        });
    </script>
</body>
</html>
