<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - SmartMeteo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CONFIGURAȚI DE CULORI DIN DASHBOARD */
        :root { 
            --sidebar-bg: #212529;
            --dashboard-green: #72b06e; /* Verdele exact din poza ta */
            --bg-gray: #f4f7f6;
            --text-dark: #333;
        }

        /* RESET - Eliminăm bulinele și setăm fontul uniform */
        body { 
            margin: 0; 
            display: flex; 
            background-color: var(--bg-gray); 
            height: 100vh; 
            overflow: hidden; 
            /* Fontul sans-serif curat din poza de dashboard */
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
        }

        /* --- SIDEBAR (Stil curat, fără liste cu puncte) --- */
        .sidebar { 
            width: 240px; 
            background-color: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: width 0.3s;
        }
        
        .sidebar-header { 
            padding: 25px 20px; 
            font-size: 22px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid #343a40;
        }

        .sidebar-menu { 
            list-style: none; /* ELIMINĂ BULINELE */
            padding: 0; 
            margin: 0; 
        }
        
        .sidebar-menu a { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: #adb5bd; 
            text-decoration: none; 
            transition: 0.2s;
        }

        .sidebar-menu li.active a, .sidebar-menu a:hover { 
            background-color: rgba(255,255,255,0.1); 
            color: white; 
        }

        .sidebar-menu i { margin-right: 15px; width: 20px; text-align: center; }

        /* --- ZONA DIN DREAPTA (CONȚINUT) --- */
        .main-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .top-header { 
            background: white; 
            padding: 15px 20px; 
            border-bottom: 1px solid #dee2e6;
            font-weight: bold;
            color: var(--text-dark);
        }

        .content-padding { padding: 20px; }

        /* BARA VERDE (Exact ca în Dashboard) */
        .status-bar { 
            background-color: var(--dashboard-green); 
            color: white; 
            padding: 15px 20px; 
            border-radius: 4px; 
            margin-bottom: 20px; 
            font-weight: 600; /* Scris plin, profesional */
            font-size: 16px;
        }

        /* FILTRE ȘI BUTOANE PARAMETRI */
        .filter-box { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #dee2e6; 
            margin-bottom: 20px; 
        }

        .toggle-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            padding: 8px 15px; 
            border-radius: 4px; 
            color: white; 
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer;
            margin-right: 5px;
        }

        /* Culori butoane (ajustate să nu fie stridente) */
        .bg-red { background: #d9534f; }
        .bg-blue { background: #5bc0de; }
        .bg-orange { background: #f0ad4e; }
        .bg-green { background: #5cb85c; }
        .bg-brown { background: #8d6e63; }

        /* GRAFICE */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; min-height: 300px; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>SmartMeteo</span>
            <i class="fas fa-bars" id="toggle-btn" style="cursor:pointer"></i>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="active"><a href="istoric.html"><i class="fas fa-chart-line"></i> Istoric</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-header">Statie Meteo Licenta</div>

        <div class="content-padding">
            <div class="status-bar">Evoluție Parametri: Statie Meteo - Licenta</div>

            <div class="filter-box">
                <div class="sensor-toggles">
                    <label class="toggle-btn bg-red"><input type="checkbox" checked> Temperatură Aer</label>
                    <label class="toggle-btn bg-blue"><input type="checkbox" checked> Umiditate Relativă</label>
                    <label class="toggle-btn bg-orange"><input type="checkbox" checked> Presiune Atmosferică</label>
                    <label class="toggle-btn bg-green"><input type="checkbox" checked> Intensitate Luminoasă</label>
                    <label class="toggle-btn bg-brown"><input type="checkbox" checked> Umiditate Sol</label>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card full-width"><canvas id="chart-temp"></canvas></div>
                <div class="chart-card"><canvas id="chart-hum"></canvas></div>
                <div class="chart-card"><canvas id="chart-pres"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // Logica simplă pentru Sidebar
        document.getElementById('toggle-btn').onclick = function() {
            document.getElementById('sidebar').style.width = 
                document.getElementById('sidebar').style.width === '70px' ? '240px' : '70px';
        };
    </script>
</body>
</html>
