<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric - SmartMeteo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 70px;
            --sidebar-bg: #212529;
            --dashboard-green: #72b06e;
            --bg-light: #f4f7f6;
            --border-color: #dee2e6;
        }

        body { 
            margin: 0; 
            display: flex; 
            background-color: var(--bg-light); 
            height: 100vh; 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
        }

        /* SIDEBAR DINAMIC */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--sidebar-bg); 
            color: white; 
            flex-shrink: 0; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header { 
            padding: 20px; 
            font-size: 20px; 
            font-weight: bold; 
            border-bottom: 1px solid #3d4145; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            white-space: nowrap;
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .sidebar-menu a { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            color: #adb5bd; 
            text-decoration: none; 
            white-space: nowrap;
        }

        .sidebar-menu li.active a { background-color: rgba(255,255,255,0.1); color: white; }
        .sidebar-menu i { min-width: 30px; font-size: 18px; }
        .sidebar.collapsed span { display: none; }

        /* MAIN CONTENT - SE RESTRÂNGE AUTOMAT */
        .main-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s ease;
        }

        /* NAVIGAȚIE SIMPLIFICATĂ */
        .top-nav { background: white; padding: 12px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; color: #555; }
        .top-nav b { color: #000; }

        .content-padding { padding: 20px; }

        /* FILTRE */
        .filters-container { background: white; padding: 20px; border-radius: 4px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .filter-row { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 5px; font-size: 13px; font-weight: bold; }
        
        /* SELECTORI GRAFICE */
        .sensor-selector-container { display: flex; justify-content: flex-end; margin-bottom: 15px; align-items: center; gap: 10px; }
        .s-btn { width: 32px; height: 32px; border-radius: 4px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .s-btn.off { opacity: 0.2; filter: grayscale(1); }

        /* CULORI BUTOANE */
        .c-temp { background: #e74c3c; } .c-hum { background: #3498db; }
        .c-pres { background: #f39c12; } .c-lux { background: #2ecc71; }
        .c-soil { background: #795548; }

        /* GRID GRAFICE */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .chart-card { background: white; padding: 15px; border-radius: 4px; border: 1px solid var(--border-color); height: 380px; }
        .chart-card.hidden { display: none; }
        .chart-title { font-size: 14px; color: #7f8c8d; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; }

        input, select { padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>SmartMeteo</span> 
            <i class="fas fa-bars" id="toggle-btn" style="cursor:pointer;"></i>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="istoric.html"><i class="fas fa-chart-line"></i> <span>Istoric</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <i class="fas fa-home"></i> > Statie Licenta > <b>Istoric Citiri</b>
        </div>

        <div class="content-padding">
            <div class="filters-container">
                <div class="filter-row">
                    <div class="input-group"><label>De la</label><input type="date" id="date-from"></div>
                    <div class="input-group"><label>Pana la</label><input type="date" id="date-to"></div>
                    <div class="input-group">
                        <label>Grupare</label>
                        <select id="group-by"><option>Ora</option><option>Zi</option></select>
                    </div>
                    <button onclick="loadData()" style="background:#3498db; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; font-weight:bold; margin-left: auto;">
                        <i class="fas fa-sync"></i> Actualizeaza Date
                    </button>
                </div>
            </div>

            </div> <div class="sensor-selector-container">
                    <span class="filter-label">FILTREAZA GRAFICE:</span>
                    <div class="sensor-icons">
                        <button class="s-box c-temp" onclick="toggleChart('box-temp', this)"><i class="fas fa-thermometer-half"></i></button>
                        <button class="s-box c-hum" onclick="toggleChart('box-hum', this)"><i class="fas fa-tint"></i></button>
                        <button class="s-box c-pres" onclick="toggleChart('box-pres', this)"><i class="fas fa-compress-arrows-alt"></i></button>
                        <button class="s-box c-lux" onclick="toggleChart('box-lux', this)"><i class="fas fa-sun"></i></button>
                        <button class="s-box c-soil" onclick="toggleChart('box-soil', this)"><i class="fas fa-seedling"></i></button>
                    </div>
                </div>

            </div>

            <div class="charts-grid">
                <div class="chart-card" id="box-temp"><div class="chart-title">Temperatura Aer (°C)</div><canvas id="chart-temp"></canvas></div>
                <div class="chart-card" id="box-hum"><div class="chart-title">Umiditate Relativa (%)</div><canvas id="chart-hum"></canvas></div>
                <div class="chart-card" id="box-pres"><div class="chart-title">Presiune Atmosferica (hPa)</div><canvas id="chart-pres"></canvas></div>
                <div class="chart-card" id="box-lux"><div class="chart-title">Intensitate Luminoasa (lx)</div><canvas id="chart-lux"></canvas></div>
                <div class="chart-card" id="box-soil"><div class="chart-title">Umiditate Sol (%)</div><canvas id="chart-soil"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // --- RESTRÂNGERE CORECTĂ SIDEBAR ---
        document.getElementById('toggle-btn').onclick = function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        };

        function toggleChart(boxId, btnElement) {
            document.getElementById(boxId).classList.toggle('hidden');
            btnElement.classList.toggle('off');
        }

        let charts = {};
        async function loadData() {
            try {
                const res = await fetch('/get-history');
                const data = await res.json();
                const labels = data.map(d => {
                    const date = new Date(d.data_ora);
                    return date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
                });

                const setup = (id, label, color, key) => {
                    const ctx = document.getElementById(id);
                    if(!ctx) return;
                    if(charts[id]) charts[id].destroy();
                    charts[id] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: label, data: data.map(d => d[key]),
                                borderColor: color, borderWidth: 2, pointRadius: 1, tension: 0.3, fill: false
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { y: { grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } }
                        }
                    });
                };

                setup('chart-temp', 'Temp', '#e74c3c', 'temperature');
                setup('chart-hum', 'Hum', '#3498db', 'humidity');
                setup('chart-pres', 'Pres', '#f39c12', 'pressure');
                setup('chart-lux', 'Lux', '#2ecc71', 'lux');
                setup('chart-soil', 'Soil', '#795548', 'soil_moisture');
            } catch (e) { console.error(e); }
        }

        document.getElementById('date-from').valueAsDate = new Date();
        document.getElementById('date-to').valueAsDate = new Date();
        loadData();
    </script>
</body>
</html>
